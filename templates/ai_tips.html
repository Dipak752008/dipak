{% extends "base.html" %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Tips Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
    overflow-x:hidden;

    background:linear-gradient(
    135deg,
    #0f172a,
    #1d4ed8,
    #7c3aed,
    #0ea5e9
    );

    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Floating Glow */

body::before{

content:"";

position:fixed;

width:450px;
height:450px;

background:#4f46e5;

border-radius:50%;

filter:blur(160px);

top:-120px;
left:-120px;

opacity:.55;

z-index:-1;

}

body::after{

content:"";

position:fixed;

width:450px;
height:450px;

background:#06b6d4;

border-radius:50%;

filter:blur(160px);

bottom:-120px;
right:-120px;

opacity:.55;

z-index:-1;

}

/* Main Glass Card */

.ai-card{

width:100%;
max-width:820px;
margin-top:40px;
background:rgba(255,255,255,.08);

backdrop-filter:blur(22px);

-webkit-backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.15);

border-radius:30px;

padding:45px;

box-shadow:
0 20px 60px rgba(0,0,0,.35);

color:white;

transition:.4s;

}

.ai-card:hover{

transform:translateY(-6px);

box-shadow:
0 30px 80px rgba(0,0,0,.45);

}
/* ========= AI Header ========= */

.ai-logo{

width:90px;
height:90px;

margin:auto;

display:flex;
align-items:center;
justify-content:center;

font-size:42px;

border-radius:50%;

background:linear-gradient(135deg,#3b82f6,#8b5cf6);

box-shadow:0 0 35px rgba(99,102,241,.7);

animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

}

/* ========= Input Fields ========= */

.glass-input{

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.20);

border-radius:15px;

padding:14px 18px;

color:white;

transition:.3s;

}

.glass-input::placeholder{

color:#d1d5db;

}

.glass-input:focus{

background:rgba(255,255,255,.12);

border-color:#60a5fa;

box-shadow:0 0 18px rgba(96,165,250,.45);

color:white;

}

.form-label{

font-weight:600;

margin-bottom:8px;

}

/* ========= Generate Button ========= */

.generate-btn{

background:linear-gradient(135deg,#2563eb,#7c3aed);

border:none;

border-radius:15px;

padding:15px;

font-size:18px;

font-weight:bold;

color:white;

transition:.35s;

}

.generate-btn:hover{

transform:translateY(-3px);

box-shadow:0 12px 25px rgba(59,130,246,.5);

}

/* ========= Home Button ========= */

.home-btn{

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.2);

border-radius:15px;

padding:14px;

font-weight:600;

color:white;

text-decoration:none;

transition:.35s;

}

.home-btn:hover{

background:white;

color:#111827;

transform:translateY(-3px);

}

/* ========= Mobile ========= */

@media(max-width:768px){

.ai-card{
padding:25px;

}

h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center">

<div class="ai-card">

<div class="text-center mb-5">

<div class="ai-logo">
🤖
</div>

<h1 class="fw-bold mt-3">
AI Study Tips Generator
</h1>

<p class="text-light">
Get personalized and smart study tips powered by AI
</p>

</div>

<form method="POST">

<div class="mb-4">

<label class="form-label">
<i class="fa-solid fa-user"></i>
Student Name
</label>

<input
type="text"
name="name"
class="form-control glass-input"
placeholder="Enter your name"
required>

</div>

<div class="mb-4">

<label class="form-label">
<i class="fa-solid fa-book"></i>
Subject
</label>

<input
type="text"
name="subject"
class="form-control glass-input"
placeholder="Enter subject"
required>

</div>

<div class="mb-4">

<label class="form-label">
<i class="fa-solid fa-bullseye"></i>
Marks (0 - 100)
</label>

<input
type="number"
name="marks"
class="form-control glass-input"
min="0"
max="100"
placeholder="Enter marks"
required>

</div>

<button class="btn generate-btn w-100">

🚀 Generate AI Tips

</button>

<a href="/" class="btn home-btn w-100 mt-3">

🏠 Back To Home

</a>

</form>

</div>

</div>

</body>

</html>
{%endblock%}
