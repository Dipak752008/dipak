{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2>Student Records</h2>

<table class="table table-striped table-hover table-bordered">

<tr>
    <th>#</th>
    <th>Roll No</th>
    <th>Name</th>
    <th>Attendance</th>
    <th>Marks</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ loop.index }}</td>
    <td>{{ student.roll }}</td>
    <td>{{ student.name }}</td>
    <td>{{ student.attendance }}</td>
    <td>{{ student.marks }}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
