{% extends 'base.html' %}

{% block content %}

<style>

body{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    min-height:100vh;
}

.register-box{
    max-width:520px;
    margin:40px auto;
}

.register-card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.register-icon{
    width:90px;
    height:90px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:40px;
    margin:auto;
}

.register-title{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
}

.form-control{
    height:55px;
    border-radius:12px;
}

.register-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    font-size:18px;
    font-weight:bold;
}

</style>

<div class="register-box">

<div class="register-card">

<div class="register-icon">
📝
</div>

<h2 class="register-title">Register</h2>

<form method="POST">

<input type="text"
name="username"
class="form-control mt-4 mb-3"
placeholder="Username"
required>

<input type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input type="password"
name="password"
class="form-control mb-4"
placeholder="Password"
required>

<button class="register-btn">
Create Account
</button>

<p class="text-center mt-4">
Already have an account?
<a href="{{ url_for('login') }}">
Login Here →
</a>
</p>

</form>

</div>

</div>

{% endblock %}
