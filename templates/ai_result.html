{% extends "base.html" %}

{% block content %}

<style>

.ai-result-page{
    min-height:100vh;
    padding:50px 0;
    background:linear-gradient(135deg,#dbeafe,#f0f9ff,#e0f2fe);
}

.result-card{
    background:rgba(255,255,255,0.95);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    padding:35px;
}

.result-title{
    text-align:center;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:25px;
}

.info-box{
    background:linear-gradient(135deg,#60a5fa,#38bdf8);
    color:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:25px;
}

.ai-box{
    background:#ffffff;
    border-left:6px solid #2563eb;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

pre{
    white-space:pre-wrap;
    font-size:17px;
    font-family:Arial;
    color:#333;
}

.btn-custom{
    border-radius:30px;
    padding:12px;
    font-weight:bold;
    font-size:17px;
}

</style>

<div class="ai-result-page">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="result-card">

<h2 class="result-title">
🤖 Personalized AI Study Tips
</h2>

<div class="info-box">

<h5>👤 Name : {{name}}</h5>

<h5>📚 Subject : {{subject}}</h5>

<h5>🏆 Marks : {{marks}}</h5>

</div>

<div class="ai-box">

<h4 class="text-success mb-3">
📖 AI Suggestions
</h4>

<pre>{{tip}}</pre>

</div>

<div class="d-grid gap-3 mt-4">

<a href="/ai_tips" class="btn btn-primary btn-custom">
🔄 Generate Again
</a>

<a href="/" class="btn btn-outline-dark btn-custom">
🏠 Back to Home
</a>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
