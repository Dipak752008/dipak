{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-success text-white text-center">
            <h2>🎯 AI Study Tips</h2>
        </div>

        <div class="card-body">

            <div class="alert alert-primary">
                <h4>👨 Student : {{ name }}</h4>
                <h5>📚 Subject : {{ subject }}</h5>
                <h5>🏆 Marks : {{ marks }}/100</h5>
            </div>

            <div class="card bg-light border-success">

                <div class="card-header bg-success text-white">
                    🤖 Personalized AI Suggestions
                </div>

                <div class="card-body">

                    <pre style="white-space:pre-wrap;font-size:16px;font-family:inherit;">
{{ tip }}
                    </pre>

                </div>

            </div>

            <div class="text-center mt-4">

                <a href="{{ url_for('ai_tips') }}" class="btn btn-primary">
                    🔄 Try Again
                </a>

                <a href="{{ url_for('home') }}" class="btn btn-dark">
                    🏠 Home
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
